services:
  postgres:
    image: postgres:17-alpine
    container_name: smart-glamping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_glamping
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - smart_glamping_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_glamping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  smart_glamping_postgres:
